  <g fill="#ffffff" opacity="0.9" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" text-anchor="middle">
    <text x="400" y="232" font-size="34" font-weight="700" letter-spacing="6">PROVIDENCE AUTO</text>
    <text x="400" y="266" font-size="14" font-weight="600" letter-spacing="9" opacity="0.55">FEATURED REVIEW</text>
  </g>
