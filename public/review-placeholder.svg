<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Providence Auto featured review">
  <defs>
    <linearGradient id="pa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="55%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="pa-glow" cx="50%" cy="42%" r="55%">
